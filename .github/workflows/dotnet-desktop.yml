name: .NET Avalonia Desktop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore YATODOL.sln

    - name: Build
      run: dotnet build YATODOL.sln --configuration ${{ matrix.configuration }} --no-restore

  package-deb:

    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            deb_arch: amd64
            rid: linux-x64
          - arch: arm64
            deb_arch: arm64
            rid: linux-arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish self-contained
      run: dotnet publish YATODOL.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish

    - name: Install packaging tools
      run: sudo apt-get update && sudo apt-get install -y imagemagick

    - name: Build .deb package
      run: |
        APP_VERSION="1.0.0"
        DEB_DIR="deb-staging"
        mkdir -p "${DEB_DIR}/DEBIAN"
        mkdir -p "${DEB_DIR}/usr/lib/yatodol"
        mkdir -p "${DEB_DIR}/usr/share/applications"
        mkdir -p "${DEB_DIR}/usr/share/icons/hicolor/256x256/apps"
        mkdir -p "${DEB_DIR}/usr/bin"

        cp -r publish/* "${DEB_DIR}/usr/lib/yatodol/"
        cp packaging/linux/yatodol.desktop "${DEB_DIR}/usr/share/applications/"

        # Install icon at multiple sizes for proper dock/launcher display
        for SIZE in 16 32 48 64 128 256; do
          mkdir -p "${DEB_DIR}/usr/share/icons/hicolor/${SIZE}x${SIZE}/apps"
          convert app-icon-256.png -resize ${SIZE}x${SIZE} "${DEB_DIR}/usr/share/icons/hicolor/${SIZE}x${SIZE}/apps/yatodol.png"
        done
        mkdir -p "${DEB_DIR}/usr/share/pixmaps"
        cp app-icon-256.png "${DEB_DIR}/usr/share/pixmaps/yatodol.png"

        # Create symlink for PATH access
        ln -s /usr/lib/yatodol/YATODOL "${DEB_DIR}/usr/bin/yatodol"

        cat > "${DEB_DIR}/DEBIAN/control" <<EOF
        Package: yatodol
        Version: ${APP_VERSION}
        Section: utils
        Priority: optional
        Architecture: ${{ matrix.deb_arch }}
        Maintainer: totopoloco
        Description: Yet another todo list
         A cross-platform TODO list application built with Avalonia UI.
        EOF

        # Remove leading spaces from control file (heredoc indentation)
        sed -i 's/^        //' "${DEB_DIR}/DEBIAN/control"

        # postinst: update icon cache and desktop database after install
        cat > "${DEB_DIR}/DEBIAN/postinst" <<'POSTINST'
        #!/bin/sh
        set -e
        if command -v gtk-update-icon-cache >/dev/null 2>&1; then
          gtk-update-icon-cache -f -t /usr/share/icons/hicolor || true
        fi
        if command -v update-desktop-database >/dev/null 2>&1; then
          update-desktop-database /usr/share/applications || true
        fi
        POSTINST
        sed -i 's/^        //' "${DEB_DIR}/DEBIAN/postinst"
        chmod 755 "${DEB_DIR}/DEBIAN/postinst"

        chmod 755 "${DEB_DIR}/DEBIAN"
        dpkg-deb --build "${DEB_DIR}" "yatodol_${APP_VERSION}_${{ matrix.deb_arch }}.deb"

    - name: Upload .deb artifact
      uses: actions/upload-artifact@v4
      with:
        name: yatodol-deb-${{ matrix.deb_arch }}
        path: "*.deb"

  package-windows:

    needs: build
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            rid: win-x64
          - arch: arm64
            rid: win-arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish self-contained
      run: dotnet publish YATODOL.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: yatodol-windows-${{ matrix.arch }}
        path: publish/
