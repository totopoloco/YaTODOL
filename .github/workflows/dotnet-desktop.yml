name: .NET Avalonia Desktop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore YATODOL.sln

    - name: Build
      run: dotnet build YATODOL.sln --configuration ${{ matrix.configuration }} --no-restore

  package-deb:

    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            deb_arch: amd64
            rid: linux-x64
          - arch: arm64
            deb_arch: arm64
            rid: linux-arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Extract version
      id: version
      run: |
        APP_VERSION=$(grep -m1 '^## ' RELEASE.md | sed 's/^## //')
        echo "version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
        echo "Building version: ${APP_VERSION}"

    - name: Publish self-contained
      run: dotnet publish YATODOL.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:Version=${{ steps.version.outputs.version }} -o publish

    - name: Install packaging tools
      run: sudo apt-get update && sudo apt-get install -y imagemagick desktop-file-utils fakeroot

    - name: Build .deb package
      run: |
        APP_VERSION="${{ steps.version.outputs.version }}"
        echo "Building .deb version: ${APP_VERSION}"
        DEB_DIR="deb-staging"
        mkdir -p "${DEB_DIR}/DEBIAN"
        mkdir -p "${DEB_DIR}/usr/lib/yatodol"
        mkdir -p "${DEB_DIR}/usr/share/applications"
        mkdir -p "${DEB_DIR}/usr/share/pixmaps"
        mkdir -p "${DEB_DIR}/usr/bin"

        # Copy application files and set executable permission
        cp -r publish/* "${DEB_DIR}/usr/lib/yatodol/"
        chmod +x "${DEB_DIR}/usr/lib/yatodol/YATODOL"

        # Desktop entry and icon (absolute path, no icon cache dependency)
        cp packaging/linux/yatodol.desktop "${DEB_DIR}/usr/share/applications/"
        cp app-icon-256.png "${DEB_DIR}/usr/share/pixmaps/yatodol.png"

        # Also install in hicolor theme for icon cache
        for SIZE in 16 32 48 64 128 256; do
          mkdir -p "${DEB_DIR}/usr/share/icons/hicolor/${SIZE}x${SIZE}/apps"
          if command -v magick >/dev/null 2>&1; then
            magick app-icon-256.png -resize "${SIZE}x${SIZE}" "${DEB_DIR}/usr/share/icons/hicolor/${SIZE}x${SIZE}/apps/yatodol.png"
          else
            convert app-icon-256.png -resize "${SIZE}x${SIZE}" "${DEB_DIR}/usr/share/icons/hicolor/${SIZE}x${SIZE}/apps/yatodol.png"
          fi
        done

        # Symlink for PATH access
        ln -s /usr/lib/yatodol/YATODOL "${DEB_DIR}/usr/bin/yatodol"

        # Control file from template
        sed -e "s/__VERSION__/${APP_VERSION}/" -e "s/__ARCH__/${{ matrix.deb_arch }}/" \
          packaging/linux/control.template > "${DEB_DIR}/DEBIAN/control"

        # Post-install script
        cp packaging/linux/postinst "${DEB_DIR}/DEBIAN/postinst"
        chmod 755 "${DEB_DIR}/DEBIAN/postinst"

        # Post-removal script
        cp packaging/linux/postrm "${DEB_DIR}/DEBIAN/postrm"
        chmod 755 "${DEB_DIR}/DEBIAN/postrm"

        chmod 755 "${DEB_DIR}/DEBIAN"

        # Fix ownership to root:root (critical for GNOME to trust .desktop files)
        sudo chown -R root:root "${DEB_DIR}"

        fakeroot dpkg-deb --build "${DEB_DIR}" "yatodol_${APP_VERSION}_${{ matrix.deb_arch }}.deb"

        # Verify contents
        dpkg-deb -c "yatodol_${APP_VERSION}_${{ matrix.deb_arch }}.deb" | head -30

    - name: Upload .deb artifact
      uses: actions/upload-artifact@v4
      with:
        name: yatodol-deb-${{ matrix.deb_arch }}
        path: "*.deb"

  package-windows:

    needs: build
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            rid: win-x64
          - arch: arm64
            rid: win-arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish self-contained
      shell: bash
      run: |
        APP_VERSION=$(grep -m1 '^## ' RELEASE.md | sed 's/^## //')
        dotnet publish YATODOL.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:Version=${APP_VERSION} -o publish

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: yatodol-windows-${{ matrix.arch }}
        path: publish/
